<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>afd dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{mono:['"Cascadia Code"','ui-monospace','Consolas','monospace']}}}}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* Light (default) */
:root{--bg:#F2F4F6;--card:#ffffff;--card2:#F9FAFB;--border:#E5E8EB;--accent:#3182F6;--accent2:#3182F6;--green:#2E7D32;--yellow:#E65100;--red:#D32F2F;--text:#191F28;--dim:#4E5968;--muted:#8B95A1;--header-bg:rgba(255,255,255,.85);--dot-color:rgba(0,0,0,.04);--glow-color:rgba(49,130,246,.06);--shadow-card:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);--shadow-hover:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06);--bar-track:#E5E8EB;--row-border:#E5E8EB;--scrollbar:#D1D5DB;--code-bg:var(--bg);--sk-kw:#3182F6;--sk-fn:#8250DF;--sk-str:#0A7B6C;--sk-type:#0969DA;--sk-cmt:#8B95A1;--ev-sense:rgba(49,130,246,.08);--ev-extract:rgba(46,125,50,.08);--ev-adapt:rgba(230,81,0,.08);--ev-mutate:rgba(211,47,47,.08);--trimmed-bg:#F2F4F6;--trimmed-border:#E5E8EB;--trimmed-text:#4E5968}
/* Dark */
.dark{--bg:#06080f;--card:#0d1117;--card2:#161b22;--border:#21262d;--accent:#3182F6;--accent2:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--text:#e6edf3;--dim:#8b949e;--muted:#484f58;--header-bg:rgba(6,8,15,.8);--dot-color:rgba(255,255,255,.025);--glow-color:rgba(47,129,247,.08);--shadow-card:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);--shadow-hover:0 4px 12px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);--bar-track:#161b22;--row-border:rgba(33,38,45,.6);--scrollbar:#21262d;--code-bg:var(--bg);--sk-kw:#ff7b72;--sk-fn:#d2a8ff;--sk-str:#a5d6ff;--sk-type:#79c0ff;--sk-cmt:#484f58;--ev-sense:rgba(88,166,255,.12);--ev-extract:rgba(63,185,80,.12);--ev-adapt:rgba(210,153,34,.12);--ev-mutate:rgba(248,81,73,.12);--trimmed-bg:rgba(47,129,247,.08);--trimmed-border:rgba(47,129,247,.15);--trimmed-text:#58a6ff}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--dot-color) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,var(--glow-color),transparent 70%);pointer-events:none;z-index:0}
header,nav,main,footer{position:relative;z-index:1}
header{border-bottom:1px solid var(--border);backdrop-filter:blur(16px);background:var(--header-bg);position:sticky;top:0;z-index:50}
nav{border-bottom:1px solid var(--border);background:var(--header-bg);backdrop-filter:blur(12px);position:sticky;top:53px;z-index:40}
.nav-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:.15s}
.nav-tab:hover{color:var(--dim)}.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
/* Cards */
.card{background:var(--card);border:none;border-radius:16px;padding:24px;box-shadow:var(--shadow-card);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
/* Hero stat card */
.hero-card{background:var(--card);border:none;padding:28px;position:relative;overflow:hidden;box-shadow:var(--shadow-card)}
.hero-card::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(49,130,246,.08),transparent 70%);pointer-events:none}
.hero-num{font-size:44px;font-weight:800;letter-spacing:-1px;line-height:1;color:var(--accent)}
.hero-sub{font-size:12px;color:var(--muted);margin-top:8px}
/* Mini stat */
.mini-num{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1;color:var(--text)}
.mini-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* Bar chart */
.bar-track{height:8px;background:var(--bar-track);border-radius:99px;overflow:hidden;margin:3px 0}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
/* Row */
.row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--row-border);font-size:13px}
.row-item:last-child{border:none}
/* Event log */
.ev-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--row-border);font-size:12px;animation:fadeIn .3s ease}
.ev-phase{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:99px}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.anim-in{animation:fadeIn .4s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}
.anim-slide{animation:slideIn .3s ease both}
/* Syntax */
.sk-kw{color:var(--sk-kw)}.sk-fn{color:var(--sk-fn)}.sk-str{color:var(--sk-str)}.sk-type{color:var(--sk-type)}.sk-cmt{color:var(--sk-cmt);font-style:italic}
/* Explorer */
.tf{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;cursor:pointer;color:var(--dim);font-size:12px;transition:.12s;border:1px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tf:hover{background:rgba(49,130,246,.06);color:var(--text)}
.tf.active{background:rgba(49,130,246,.08);border-color:rgba(49,130,246,.2);color:var(--accent)}
.td{font-size:11px;font-weight:700;color:var(--muted);padding:6px 0 2px;cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none}
.td:hover{color:var(--dim)}
#code-panel{transition:opacity .25s,transform .3s ease}
#code-panel.panel-hide{opacity:0;transform:translateX(16px);pointer-events:none}
.trimmed{display:inline-block;background:var(--trimmed-bg);color:var(--trimmed-text);font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--trimmed-border);font-style:italic}
.dep-item{padding:3px 0;font-size:12px;cursor:pointer;color:var(--dim);transition:color .12s;font-family:inherit}
.dep-item:hover{color:var(--accent)}
.new-flash{animation:fadeIn .3s ease,pulse 2s ease 1}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div style="max-width:1100px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="3" y="3" width="22" height="22" rx="6" fill="var(--accent)" opacity=".12"/>
          <path d="M9 14h10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
          <path d="M14 9v10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" opacity=".5"/>
          <circle cx="14" cy="14" r="3" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity=".3"/>
        </svg>
        <span style="font-weight:700;font-size:16px;letter-spacing:-.3px">afd</span>
        <span style="font-size:13px;color:var(--muted);font-weight:500;display:none" class="sm-show">Autonomous Flow Daemon</span>
      </div>
      <span id="status-badge" style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--card2);color:var(--muted);border:1px solid var(--border)">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--muted)"></span>CONNECTING
      </span>
    </div>
    <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:var(--muted)">
      <span id="hdr-uptime" class="sm-show">--</span>
      <span style="color:var(--border)" class="sm-show">&middot;</span>
      <span id="hdr-ecosystem" class="sm-show">--</span>
      <span style="color:var(--border)" class="sm-show">&middot;</span>
      <span id="hdr-port" class="sm-show">--</span>
      <button id="theme-toggle" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;font-size:14px;line-height:1;transition:.2s" title="Toggle dark/light mode">&#9790;</button>
    </div>
  </div>
</header>

<!-- ═══ NAV ═══ -->
<nav>
  <div style="max-width:1100px;margin:0 auto;padding:0 24px;display:flex;gap:4px">
    <button class="nav-tab active" id="btn-overview" onclick="switchTab('overview',this)"></button>
    <button class="nav-tab" id="btn-explorer" onclick="switchTab('explorer',this)"></button>
  </div>
</nav>

<!-- ═══ MAIN ═══ -->
<main style="max-width:1100px;margin:0 auto;padding:24px">

<!-- Overview -->
<div id="tab-overview">
  <!-- Hero row: one big stat + 3 small -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card hero-card anim-in d1" style="grid-column:1/-1">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px">
        <div>
          <div class="card-title" id="sl-compress"></div>
          <div class="hero-num" id="sc-compress">--</div>
          <div class="hero-sub" id="sc-compress-sub"></div>
        </div>
        <div style="display:flex;gap:32px">
          <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px" id="sl-uptime"></div><div class="mini-num" style="color:var(--accent)" id="sc-uptime">--</div><div class="mini-sub" id="sc-uptime-sub"></div></div>
          <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px" id="sl-healed"></div><div class="mini-num" style="color:var(--green)" id="sc-healed">--</div><div class="mini-sub" id="sc-healed-sub"></div></div>
          <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px" id="sl-antibodies"></div><div class="mini-num" style="color:var(--yellow)" id="sc-antibodies">--</div><div class="mini-sub" id="sc-antibodies-sub"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Breakdown + Lifetime -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card anim-in d2"><div class="card-title" id="h-today"></div><div id="today-content"><span style="color:var(--muted);font-size:12px">--</span></div></div>
    <div class="card anim-in d3"><div class="card-title" id="h-lifetime"></div><div id="lifetime-content"></div></div>
  </div>

  <!-- 7-day chart — full width, taller -->
  <div class="card anim-in d3" style="margin-bottom:16px"><div class="card-title" id="h-history"></div><div id="history-content"></div></div>

  <!-- Immune + Events -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card anim-in d4"><div class="card-title" id="h-immune"></div><div id="immune-content"></div></div>
    <div class="card anim-in d5"><div class="card-title" id="h-events"></div><div id="events-log" style="max-height:200px;overflow-y:auto;font-family:'Cascadia Code',Consolas,monospace;font-size:12px"></div></div>
  </div>
</div>

<!-- Explorer -->
<div id="tab-explorer" style="display:none">
  <div style="display:flex;gap:16px;min-height:520px">
    <div class="card" style="width:260px;flex-shrink:0">
      <div class="card-title" id="h-files"></div>
      <input id="file-search" oninput="filterFiles()" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;margin-bottom:8px;outline:none;transition:border-color .15s" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <div id="file-tree" style="max-height:460px;overflow-y:auto"></div>
    </div>
    <div class="card" style="flex:1;min-width:0;display:none" id="code-panel">
      <div id="holo-meta" style="font-size:12px;color:var(--dim);margin-bottom:12px"></div>
      <div id="holo-view" style="font-family:'Cascadia Code',Consolas,monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;overflow:auto;max-height:460px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px"></div>
      <div id="ndepth-panel" style="margin-top:12px"></div>
    </div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center" id="code-empty">
      <div style="text-align:center;max-width:380px">
        <div style="font-size:18px;font-weight:600;margin-bottom:8px" id="empty-title"></div>
        <p style="font-size:12px;color:var(--dim);line-height:1.6;margin-bottom:24px" id="empty-desc"></p>
        <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px">
          <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:left;width:150px">
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Source</div>
            <div style="font-family:'Cascadia Code',monospace;font-size:10px;line-height:1.4;color:var(--dim)">
              <span class="sk-kw">export function</span> <span class="sk-fn">parse</span>() {<br>
              &nbsp;&nbsp;<span style="color:var(--muted)">// ... 50 lines</span><br>
              &nbsp;&nbsp;<span style="color:var(--muted)">// ... of logic</span><br>}
            </div>
            <div style="font-size:10px;color:var(--red);margin-top:6px;opacity:.7">~2,000 tokens</div>
          </div>
          <div style="color:var(--muted);font-size:20px">&rarr;</div>
          <div style="background:var(--card2);border:1px solid rgba(49,130,246,.2);border-radius:10px;padding:14px;text-align:left;width:150px;box-shadow:0 0 24px var(--glow-color)">
            <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Hologram</div>
            <div style="font-family:'Cascadia Code',monospace;font-size:10px;line-height:1.4;color:var(--text)">
              <span class="sk-kw">export function</span> <span class="sk-fn">parse</span>(<br>
              &nbsp;&nbsp;input: <span class="sk-type">string</span><br>
              ): <span class="sk-type">AST</span> <span class="trimmed">&ctdot; trimmed</span>
            </div>
            <div style="font-size:10px;color:var(--green);margin-top:6px;opacity:.8">~200 tokens (90% saved)</div>
          </div>
        </div>
        <div id="empty-steps" style="display:flex;justify-content:center;gap:16px;font-size:10px;color:var(--muted)"></div>
        <p style="font-size:12px;color:var(--muted);margin-top:20px" id="empty-select"></p>
      </div>
    </div>
  </div>
</div>
</main>

<footer style="text-align:center;padding:16px;font-size:11px;color:var(--muted)">afd web dashboard &middot; <span id="ft-updated">--</span></footer>

<style>@media(min-width:640px){.sm-show{display:inline!important}}@media(max-width:768px){[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}}</style>

<script>
/* Theme toggle */
function toggleTheme(){const d=document.documentElement;const isDark=d.classList.toggle('dark');localStorage.setItem('afd-theme',isDark?'dark':'light');document.getElementById('theme-toggle').textContent=isDark?'\u2600':'\u263E'}
(function(){const s=localStorage.getItem('afd-theme');if(s==='dark')document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');})();
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('theme-toggle').textContent=document.documentElement.classList.contains('dark')?'\u2600':'\u263E'});
/*{{I18N}}*/
if(!window.T)window.T={todaySavings:"Today's Savings",lifetimeRoi:"Lifetime ROI",weekHistory:"7-Day History",
  savingsBreakdown:"Savings Breakdown",lifetimeBreakdown:"Lifetime Breakdown",
  immune:"Immune System",liveEvents:"Live Events",files:"Files",hologram:"Hologram",
  original:"Original",actual:"Actual",saved:"Saved",antibodies:"Antibodies",autoHealed:"Auto-healed",
  massSkipped:"Mass events skipped",dormant:"Dormant transitions",estValue:"Est. Value",totalSaved:"Total Saved",
  wsmap:"W/S Map",pinpoint:"Pinpoint",noData:"Use afd_read or afd_hologram to start tracking",
  noHistory:"No daily history yet",searchFiles:"Search files...",
  loading:"Loading...",nDepthDeps:"N-Depth Dependencies",overview:"Overview",explorer:"Context Compressor",
  savePct:"saved",uptime:"Uptime",compression:"Compression",
  holoWhat:"What is a Hologram?",holoDesc:"A code compression technique that strips function bodies and keeps only type signatures, saving 80%+ LLM tokens.",
  holoHowLabel:"How it works",holoStep1:"Parse source into AST",holoStep2:"Strip function bodies",holoStep3:"Return signatures only",
  selectFile:"Select a file from the tree",rawFile:"Raw text",astNotSupported:"AST compression not supported",trimmed:"body trimmed",
  lang:"en"};
const t=k=>T[k]||k;

document.getElementById('btn-overview').textContent=t('overview');
document.getElementById('btn-explorer').textContent=t('explorer');
document.getElementById('sl-compress').textContent=t('compression');
document.getElementById('sl-uptime').textContent=t('uptime');
document.getElementById('sl-healed').textContent=t('autoHealed');
document.getElementById('sl-antibodies').textContent=t('antibodies');
document.getElementById('h-today').textContent=t('savingsBreakdown');
document.getElementById('h-lifetime').textContent=t('lifetimeBreakdown');
document.getElementById('h-history').textContent=t('weekHistory');
document.getElementById('h-immune').textContent=t('immune');
document.getElementById('h-events').textContent=t('liveEvents');
document.getElementById('h-files').textContent=t('files');
document.getElementById('file-search').placeholder=t('searchFiles');
document.getElementById('empty-title').textContent=t('holoWhat');
document.getElementById('empty-desc').textContent=t('holoDesc');
document.getElementById('empty-select').textContent='\u2190 '+t('selectFile');
document.getElementById('empty-steps').innerHTML=`<span>\u2460 ${t('holoStep1')}</span><span>\u2461 ${t('holoStep2')}</span><span>\u2462 ${t('holoStep3')}</span>`;
document.getElementById('events-log').innerHTML='<span style="color:var(--muted);font-size:12px">'+t('loading')+'</span>';

const CTP=3.5;
const fk=c=>{const v=c/CTP;return v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':Math.round(v)};
const pct=(a,b)=>b>0?Math.round(a/b*100):0;

function countUp(el,target,suffix,dur){
  dur=dur||700;suffix=suffix||'';
  if(!target){el.textContent='0'+suffix;return}
  const start=performance.now();
  (function step(ts){
    const p=Math.min((ts-start)/dur,1);
    const ease=1-Math.pow(1-p,3);
    const cur=Math.round(target*ease);
    el.textContent=(cur>=1e6?(cur/1e6).toFixed(1)+'M':cur>=1e3?(cur/1e3).toFixed(1)+'K':cur)+suffix;
    if(p<1)requestAnimationFrame(step);
  })(performance.now());
}

function barRow(label,p,valStr,color){
  return `<div style="display:flex;align-items:center;gap:10px;margin:6px 0">
    <span style="width:60px;text-align:right;font-size:11px;color:var(--dim);flex-shrink:0">${label}</span>
    <div class="bar-track" style="flex:1"><div class="bar-fill" style="width:${Math.min(100,p)}%;background:${color}"></div></div>
    <span style="width:100px;font-size:11px;color:var(--dim);flex-shrink:0">${valStr}</span>
  </div>`;
}

function switchTab(id,btn){
  document.getElementById('tab-overview').style.display=id==='overview'?'block':'none';
  document.getElementById('tab-explorer').style.display=id==='explorer'?'block':'none';
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(id==='explorer'&&!filesLoaded)loadFiles();
}

/* ══ Syntax highlight (placeholder-safe) ══ */
function highlight(code,lang){
  if(!lang||lang==='plaintext'||lang==='markdown')return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let r=esc(code);const tok=[];
  const ph=(c,m)=>{const i=tok.length;tok.push('<span class="'+c+'">'+m+'</span>');return '\x00'+i+'\x00'};
  r=r.replace(/(\/\/[^\n]*)/g,(_,m)=>ph('sk-cmt',m));
  r=r.replace(/(#[^\n]*)/g,(_,m)=>ph('sk-cmt',m));
  r=r.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g,m=>ph('sk-str',m));
  const kws={typescript:/\b(import|export|from|function|const|let|var|class|interface|type|enum|async|await|return|if|else|extends|implements|new|this|typeof|void)\b/g,python:/\b(import|from|def|class|return|if|else|elif|for|while|with|as|self|None|True|False|async|await|raise|try|except|yield)\b/g,go:/\b(package|import|func|type|struct|interface|return|if|else|for|range|var|const|map|chan|go|defer|switch|case)\b/g,rust:/\b(use|mod|pub|fn|struct|enum|impl|trait|let|mut|const|return|if|else|match|for|while|self|Self|where|async|await|crate|super)\b/g};
  const kw=kws[lang]||kws.typescript;
  r=r.replace(kw,'<span class="sk-kw">$1</span>');
  r=r.replace(/\b([A-Z]\w*)\b/g,'<span class="sk-type">$1</span>');
  r=r.replace(/\b(\w+)(?=\s*\()/g,'<span class="sk-fn">$1</span>');
  r=r.replace(/\x00(\d+)\x00/g,(_,i)=>tok[+i]);
  return r;
}
function decorateTrimmed(html){return html.replace(/\{\s*\.\.\.\s*\}/g,'<span class="trimmed">&ctdot; '+t('trimmed')+'</span>')}
const AST_LANGS=new Set(['typescript','javascript','python','go','rust','tsx','jsx']);
function resolveDisplayLang(a,f){if(a&&AST_LANGS.has(a))return{lang:a,supported:true};const e=(f||'').split('.').pop()?.toLowerCase()||'';const m={md:'markdown',json:'json',yml:'yaml',yaml:'yaml',toml:'toml',txt:'plaintext'};return{lang:m[e]||a||'plaintext',supported:false}}

/* ════════════════════ Renderers ════════════════════ */

function renderHeader(s){
  const b=document.getElementById('status-badge');
  b.style.background='rgba(49,130,246,.08)';b.style.color='var(--accent)';b.style.borderColor='rgba(49,130,246,.15)';
  b.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite"></span>LIVE';
  const u=s.uptime,ut=u<60?u+'s':u<3600?Math.floor(u/60)+'m':Math.floor(u/3600)+'h '+Math.floor(u%3600/60)+'m';
  document.getElementById('hdr-uptime').textContent=t('uptime')+': '+ut;
  document.getElementById('hdr-ecosystem').textContent=s.ecosystem?.primary||'--';
  document.getElementById('hdr-port').textContent='Port '+location.port;
}

let firstRender=true;
function renderStatCards(s){
  const u=s.uptime,ut=u<60?u+'s':u<3600?Math.floor(u/60)+'m':Math.floor(u/3600)+'h '+Math.floor(u%3600/60)+'m';
  const im=s.immune||{},sp=s.suppression||{};
  const h=s.hologram,ctx=s.ctxSavings||{daily:[],lifetime:[]},today=new Date().toISOString().slice(0,10);
  const ht=h.today||(h.daily[0]?.date===today?h.daily[0]:null);
  const ho=ht?.originalChars||0,ha=ht?.hologramChars||0;
  const wd=ctx.daily.find(r=>r.date===today&&r.type==='wsmap'),pp=ctx.daily.find(r=>r.date===today&&r.type==='pinpoint');
  const wo=wd?.original_chars||0,ws=wd?.saved_chars||0,po=pp?.original_chars||0,ps=pp?.saved_chars||0;
  const orig=ho+wo+po,sv=Math.max(0,orig-(ha+(wo-ws)+(po-ps))),compPct=pct(sv,orig);
  if(firstRender){
    countUp(document.getElementById('sc-compress'),compPct,'%',900);
    countUp(document.getElementById('sc-healed'),im.autoHealed||0,'');
    countUp(document.getElementById('sc-antibodies'),im.antibodies||0,'');
    firstRender=false;
  }else{
    document.getElementById('sc-compress').textContent=compPct+'%';
    document.getElementById('sc-healed').textContent=(im.autoHealed||0)+'';
    document.getElementById('sc-antibodies').textContent=(im.antibodies||0)+'';
  }
  document.getElementById('sc-uptime').textContent=ut;
  document.getElementById('sc-uptime-sub').textContent=s.ecosystem?.primary||'--';
  document.getElementById('sc-compress-sub').textContent=orig?fk(sv)+' tok '+t('saved')+' today':'--';
  document.getElementById('sc-healed-sub').textContent=(sp.massEventsSkipped||0)+' '+t('massSkipped');
  document.getElementById('sc-antibodies-sub').textContent=(sp.dormantTransitions||0)+' '+t('dormant');
}

function renderToday(s){
  const el=document.getElementById('today-content'),h=s.hologram,ctx=s.ctxSavings||{daily:[],lifetime:[]},today=new Date().toISOString().slice(0,10);
  const ht=h.today||(h.daily[0]?.date===today?h.daily[0]:null);
  const ho=ht?.originalChars||0,ha=ht?.hologramChars||0;
  const wd=ctx.daily.find(r=>r.date===today&&r.type==='wsmap'),pp=ctx.daily.find(r=>r.date===today&&r.type==='pinpoint');
  const wo=wd?.original_chars||0,ws=wd?.saved_chars||0,po=pp?.original_chars||0,ps=pp?.saved_chars||0;
  const orig=ho+wo+po,act=ha+(wo-ws)+(po-ps),sv=Math.max(0,orig-act),sp=pct(sv,orig);
  if(!orig){el.innerHTML='<span style="color:var(--muted);font-size:12px">'+t('noData')+'</span>';return}
  el.innerHTML=barRow(t('original'),100,fk(orig)+' tok','var(--muted)')
    +barRow(t('actual'),pct(act,orig),fk(act)+' tok','var(--yellow)')
    +barRow(t('saved'),sp,sp+'% ('+fk(sv)+' tok)','var(--accent)');
}

function renderLifetime(s){
  const el=document.getElementById('lifetime-content'),lt=s.hologram.lifetime,ctx=s.ctxSavings||{daily:[],lifetime:[]};
  const hs=Math.max(0,lt.originalChars-lt.hologramChars),wm=ctx.lifetime.find(r=>r.type==='wsmap')?.total_saved_chars||0,pp=ctx.lifetime.find(r=>r.type==='pinpoint')?.total_saved_chars||0;
  const total=hs+wm+pp,tok=Math.round(total/CTP),est=(tok/1000*0.003).toFixed(2);
  if(!total){el.innerHTML='<span style="color:var(--muted);font-size:12px">--</span>';return}
  el.innerHTML=`<div style="margin-bottom:12px"><span style="font-size:24px;font-weight:800;letter-spacing:-.5px">~${fk(total)} tok</span> <span style="font-size:12px;color:var(--muted)">(${t('estValue')}: $${est})</span></div>
    <div class="row-item"><span style="color:var(--dim)">${t('hologram')}</span><span style="font-weight:500">${fk(hs)} tok <span style="color:var(--muted)">(${pct(hs,total)}%)</span></span></div>
    <div class="row-item"><span style="color:var(--dim)">${t('wsmap')}</span><span style="font-weight:500">${fk(wm)} tok <span style="color:var(--muted)">(${pct(wm,total)}%)</span></span></div>
    <div class="row-item"><span style="color:var(--dim)">${t('pinpoint')}</span><span style="font-weight:500">${fk(pp)} tok <span style="color:var(--muted)">(${pct(pp,total)}%)</span></span></div>`;
}

function renderHistory(s){
  const el=document.getElementById('history-content'),h=s.hologram,ctx=s.ctxSavings||{daily:[],lifetime:[]},dm=new Map();
  for(const d of h.daily)dm.set(d.date,{o:d.originalChars,s:d.originalChars-d.hologramChars});
  for(const r of ctx.daily){const e=dm.get(r.date)||{o:0,s:0};dm.set(r.date,{o:e.o+r.original_chars,s:e.s+r.saved_chars})}
  const days=[...dm.keys()].sort().reverse().slice(0,7).reverse(),today=new Date().toISOString().slice(0,10);
  if(!days.length){el.innerHTML='<span style="color:var(--muted);font-size:12px;display:block;text-align:center;padding:20px 0">'+t('noHistory')+'</span>';return}
  const vals=days.map(d=>{const{o,s}=dm.get(d);return{d,p:pct(s,o),o,s}});
  const maxO=Math.max(...vals.map(v=>v.o),1);
  const W=1000,H=140,pad=30,bw=Math.min(80,(W-pad*2)/(days.length*1.4));
  const gap=(W-pad*2-bw*days.length)/(days.length-1||1);
  let svg=`<svg viewBox="0 0 ${W} ${H+30}" style="width:100%;max-height:180px" id="hsvg">`;
  for(let i=0;i<4;i++){const y=pad+i*(H-pad)/3;svg+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4"/>`}
  vals.forEach((v,i)=>{
    const x=pad+i*(bw+gap),bh=Math.max(3,(v.s/maxO)*(H-pad-8)),col=v.p>=70?'var(--accent)':v.p>=40?'var(--yellow)':'var(--muted)';
    svg+=`<rect data-th="${bh}" x="${x}" y="${H}" width="${bw}" height="0" rx="4" fill="${col}" opacity=".9"/>`;
    svg+=`<text x="${x+bw/2}" y="${H+16}" text-anchor="middle" fill="var(--muted)" font-size="11" font-weight="500">${v.d===today?'Today':v.d.slice(5)}</text>`;
    svg+=`<text x="${x+bw/2}" y="${H-bh-6}" text-anchor="middle" fill="var(--dim)" font-size="10" font-weight="600" opacity="0" data-fy="${H-bh-6}">${v.p}%</text>`;
  });
  el.innerHTML=svg+'</svg>';
  requestAnimationFrame(()=>{
    const sv=document.getElementById('hsvg');if(!sv)return;
    sv.querySelectorAll('rect[data-th]').forEach((r,i)=>{
      const tH=+r.dataset.th;
      setTimeout(()=>{const s=performance.now();(function f(ts){const p=Math.min((ts-s)/500,1);const e=1-Math.pow(1-p,3);r.setAttribute('height',String(tH*e));r.setAttribute('y',String(H-tH*e));if(p<1)requestAnimationFrame(f)})(performance.now())},i*60);
    });
    sv.querySelectorAll('text[data-fy]').forEach((t,i)=>{setTimeout(()=>t.setAttribute('opacity','1'),i*60+400)});
  });
}

function renderImmune(s){
  const el=document.getElementById('immune-content'),im=s.immune||{},sp=s.suppression||{};
  el.innerHTML=`
    <div class="row-item"><span style="color:var(--dim)">${t('antibodies')}</span><span style="font-family:'Cascadia Code',monospace;font-weight:600">${im.antibodies||0}</span></div>
    <div class="row-item"><span style="color:var(--dim)">${t('autoHealed')}</span><span style="font-family:'Cascadia Code',monospace;font-weight:600">${im.autoHealed||0}</span></div>
    <div class="row-item"><span style="color:var(--dim)">${t('massSkipped')}</span><span style="font-family:'Cascadia Code',monospace;font-weight:600">${sp.massEventsSkipped||0}</span></div>
    <div class="row-item"><span style="color:var(--dim)">${t('dormant')}</span><span style="font-family:'Cascadia Code',monospace;font-weight:600">${sp.dormantTransitions||0}</span></div>`;
}

function render(s){renderHeader(s);renderStatCards(s);renderToday(s);renderLifetime(s);renderHistory(s);renderImmune(s);document.getElementById('ft-updated').textContent=new Date().toLocaleTimeString()}

/* ════════════════════ Explorer ════════════════════ */

let allFiles=[],filesLoaded=false,activeFile=null,openDirs=new Set();
const dotColor=f=>{const e=f.split('.').pop();return{ts:'#3182F6',tsx:'#3182F6',js:'#E65100',jsx:'#E65100',py:'#8250DF',pyi:'#8250DF',go:'#0969DA',rs:'#D32F2F',json:'#E65100',md:'#8B95A1',yml:'#8B95A1',yaml:'#8B95A1',toml:'#8B95A1'}[e]||'var(--muted)'};

function buildTree(files){const root={};for(const f of files){const p=f.split('/');let n=root;for(let i=0;i<p.length-1;i++){if(!n[p[i]])n[p[i]]={};n=n[p[i]]}n[p[p.length-1]]=f}return root}

function renderTreeNode(node,prefix,depth){
  let html='';const dirs=[],leafs=[];
  for(const k in node){typeof node[k]==='string'?leafs.push(k):dirs.push(k)}
  dirs.sort();leafs.sort();
  for(const d of dirs){
    const path=prefix?prefix+'/'+d:d;const open=openDirs.has(path);
    html+=`<div class="td" style="padding-left:${depth*14}px" onclick="toggleDir('${path}')"><span style="font-size:9px;display:inline-block;transition:transform .15s;transform:rotate(${open?90:0}deg)">&#9654;</span><span>${d}/</span></div>`;
    if(open)html+=renderTreeNode(node[d],path,depth+1);
  }
  for(const f of leafs){
    const fp=node[f];
    html+=`<div class="tf${fp===activeFile?' active':''}" style="padding-left:${depth*14+10}px" onclick="selectFile('${fp.replace(/'/g,"\\'")}')" title="${fp}"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dotColor(f)};flex-shrink:0"></span><span style="overflow:hidden;text-overflow:ellipsis">${f}</span></div>`;
  }
  return html;
}
function renderTree(files){document.getElementById('file-tree').innerHTML=renderTreeNode(buildTree(files),'',0)||'<span style="color:var(--muted);font-size:12px">no files</span>'}
function toggleDir(path){openDirs.has(path)?openDirs.delete(path):openDirs.add(path);renderTree(currentFiles)}

let currentFiles=[];
async function loadFiles(){
  try{const r=await fetch('/files');const d=await r.json();allFiles=d.files||[];filesLoaded=true;
    const top=new Set();for(const f of allFiles){const i=f.indexOf('/');if(i>0)top.add(f.slice(0,i))}
    top.forEach(d=>openDirs.add(d));currentFiles=allFiles;renderTree(allFiles);
  }catch{document.getElementById('file-tree').innerHTML='<span style="color:var(--red);font-size:12px">failed</span>'}
}
function filterFiles(){
  const q=document.getElementById('file-search').value.toLowerCase();
  currentFiles=q?allFiles.filter(f=>f.toLowerCase().includes(q)):allFiles;
  if(q){const dirs=new Set();currentFiles.forEach(f=>{const p=f.split('/');for(let i=1;i<p.length;i++)dirs.add(p.slice(0,i).join('/'))});openDirs=dirs}
  renderTree(currentFiles);
}

async function selectFile(path){
  activeFile=path;renderTree(currentFiles);
  const panel=document.getElementById('code-panel'),empty=document.getElementById('code-empty');
  const view=document.getElementById('holo-view'),meta=document.getElementById('holo-meta'),ndep=document.getElementById('ndepth-panel');
  empty.style.display='none';panel.style.display='block';panel.classList.add('anim-slide');
  view.innerHTML='<span style="color:var(--muted)">'+t('loading')+'</span>';meta.textContent='';ndep.innerHTML='';
  try{
    const r=await fetch('/hologram?file='+encodeURIComponent(path)+'&nDepth=2');const d=await r.json();
    if(d.error){view.innerHTML='<span style="color:var(--dim)">'+d.error+'</span>';return}
    const parts=d.hologram.split('// [\u{1F517} N-Depth Dependencies]');
    const skeleton=parts[0].trim(),deps=parts[1]||'';
    const{lang,supported}=resolveDisplayLang(d.language,path);
    const lb=supported?`<span style="color:var(--accent2)">${lang}</span>`:`<span style="color:var(--muted)">${lang}</span> <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--card2);border:1px solid var(--border);color:var(--muted)">${t('astNotSupported')}</span>`;
    const sv=d.savings>0?`<span style="color:var(--green);font-weight:600">(${d.savings}% ${t('savePct')})</span>`:`<span style="color:var(--muted)">(${t('rawFile')})</span>`;
    meta.innerHTML=`<span style="color:var(--text);font-weight:600">${path}</span> <span style="color:var(--border)">&middot;</span> ${lb} <span style="color:var(--border)">&middot;</span> ${(d.originalLength/1024).toFixed(1)}KB &rarr; ${(d.hologramLength/1024).toFixed(1)}KB ${sv}`;
    view.innerHTML=decorateTrimmed(highlight(skeleton,lang));
    if(deps.trim()){
      const lines=deps.trim().split('\n');let html='<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px"><div class="card-title">'+t('nDepthDeps')+'</div>';let cf='';
      for(const line of lines){
        const fm=line.match(/^\/\/ --- (.+) \(L(\d)\) ---$/);
        if(fm){cf=fm[1];const c=fm[2]==='2'?'background:var(--ev-extract);color:var(--green)':'background:var(--ev-adapt);color:var(--yellow)';html+=`<div style="font-size:11px;color:var(--muted);margin-top:8px"><span style="display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-right:4px;${c}">L${fm[2]}</span>${cf}</div>`}
        else if(line.trim()&&!line.startsWith('//')){html+=`<div class="dep-item" style="font-family:'Cascadia Code',monospace" onclick="selectFile('${cf.replace(/'/g,"\\'")}')">${line.replace(/</g,'&lt;')}</div>`}
      }
      ndep.innerHTML=html+'</div>';
    }
  }catch(e){view.innerHTML='<span style="color:var(--red);font-size:12px">'+e.message+'</span>'}
}

/* ════════════════════ SSE + Polling ════════════════════ */

let refreshTimer;
async function load(){
  try{const s=await(await fetch('/score')).json();render(s)}
  catch{const b=document.getElementById('status-badge');b.style.background='var(--card2)';b.style.color='var(--muted)';b.style.borderColor='var(--border)';b.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:var(--muted)"></span>OFFLINE'}
}

const evLog=document.getElementById('events-log');let evStarted=false;
function appendEvent(e){
  if(!evStarted){evLog.innerHTML='';evStarted=true}
  const colors={Sense:'var(--ev-sense);color:var(--accent)',Extract:'var(--ev-extract);color:var(--green)',Adapt:'var(--ev-adapt);color:var(--yellow)',Mutate:'var(--ev-mutate);color:var(--red)'};
  const c=colors[e.phase]||colors.Sense;
  const div=document.createElement('div');div.className='ev-item';
  div.innerHTML=`<span class="ev-phase" style="background:${c}">${e.phase}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dim)">${e.msg}</span><span style="color:var(--muted);font-size:10px;flex-shrink:0">${new Date(e.ts).toLocaleTimeString()}</span><span class="new-flash" style="font-size:9px;font-weight:700;color:var(--accent);background:rgba(49,130,246,.08);padding:2px 6px;border-radius:99px">NEW</span>`;
  evLog.prepend(div);while(evLog.children.length>50)evLog.lastChild.remove();
}

load();
const es=new EventSource('/events');
let sseGrace=null;
function clearSseGrace(){if(sseGrace){clearTimeout(sseGrace);sseGrace=null}}
es.onmessage=e=>{clearSseGrace();try{appendEvent(JSON.parse(e.data))}catch{};clearTimeout(refreshTimer);refreshTimer=setTimeout(load,500)};
es.onopen=()=>{clearSseGrace()};
es.onerror=()=>{if(!sseGrace)sseGrace=setTimeout(()=>{const b=document.getElementById('status-badge');b.style.background='var(--ev-adapt)';b.style.color='var(--yellow)';b.style.borderColor='var(--border)';b.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:var(--yellow)"></span>RECONNECTING';sseGrace=null},2000)};
setInterval(load,10000);
</script>
